# Lot Genius — deliverable QE gate (Docs/QE-PLAN.md §7.2 / §9).
#
# This is the CI gate for the DELIVERABLE repo only. The Background-IP runtime and
# the Python testbed live under local-dev/ and are .gitignore'd — they are NOT in CI.
# Therefore every Rust gate here builds the crates in their DEFAULT (runtime-free)
# configuration and NEVER passes `--features runtime`: that optional dep is absent
# from this repo by design (PRD §9), so a `--features runtime` build correctly fails.
# Keeping the default build green IS the "IP boundary intact" check (QE-PLAN §9).
#
# Triggers: PRs and pushes to main. Three independent gates run in parallel; any
# failure fails the workflow.

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned stable Rust toolchain. Matches the crates' declared MSRV
  # (rust-version = "1.85" in both Cargo.toml manifests).
  RUST_TOOLCHAIN: "1.85.0"
  # Pinned Terraform line (~1.x per QE-PLAN / infra/versions.tf >= 1.7.0).
  TERRAFORM_VERSION: "1.9.8"

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1 — Rust deliverable (the seam + the interface crate).
  # DEFAULT build only: no `--features runtime`. Covers QE-PLAN §7.2 fmt/clippy/
  # check + the `--smoke` seam check (4 contracts load, dispatch wired).
  # ---------------------------------------------------------------------------
  rust-deliverable:
    name: Rust deliverable (default build, no runtime feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal \
            --component rustfmt,clippy
          rustup default "${RUST_TOOLCHAIN}"
          rustc --version && cargo --version

      # Cache both crates' target/ and the cargo registry, keyed on the lockfiles.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/lotgenius-contract/target
            src/mcp-server/target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('src/lotgenius-contract/Cargo.lock', 'src/mcp-server/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      # --- interface crate: lotgenius-contract -------------------------------
      - name: contract — fmt
        working-directory: src/lotgenius-contract
        run: cargo fmt --check

      - name: contract — clippy (-D warnings)
        working-directory: src/lotgenius-contract
        run: cargo clippy --all-targets -- -D warnings

      - name: contract — check
        working-directory: src/lotgenius-contract
        run: cargo check

      # --- seam crate: lotgenius-mcp (DEFAULT features = contracts only) -----
      - name: seam — fmt
        working-directory: src/mcp-server
        run: cargo fmt --check

      - name: seam — clippy (-D warnings)
        working-directory: src/mcp-server
        run: cargo clippy --all-targets -- -D warnings

      - name: seam — check
        working-directory: src/mcp-server
        run: cargo check

      # The seam smoke: asserts all 4 tool contracts load + dispatch is wired,
      # with NO runtime present (the IP-boundary-intact assertion, QE-PLAN §9).
      - name: seam — smoke (4 contracts load)
        working-directory: src/mcp-server
        run: cargo run -- --smoke

  # ---------------------------------------------------------------------------
  # Gate 2 — Orchestrator (Python 3.11). pytest + ruff + mypy.
  # ---------------------------------------------------------------------------
  orchestrator-python:
    name: Orchestrator (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/orchestrator/pyproject.toml

      - name: Install (editable, with test extras)
        run: pip install -e '.[test]'

      - name: pytest
        run: pytest -q

      - name: ruff
        run: ruff check .

      # mypy reads its target paths from pyproject ([tool.mypy] files = [...]),
      # so no path arg is needed (and adding one would override that config).
      - name: mypy
        run: mypy

  # ---------------------------------------------------------------------------
  # Gate 3 — Terraform (infra/). fmt + validate with -backend=false.
  # The azurerm backend isn't reachable in CI and we are NOT applying, so init
  # runs backend-less and validate checks config correctness only.
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform (infra/, validate-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: fmt (recursive)
        run: terraform fmt -check -recursive

      - name: init (no backend)
        run: terraform init -backend=false -input=false

      - name: validate
        run: terraform validate -no-color

  # ---------------------------------------------------------------------------
  # Gate 4 — Admin shim (Rust BE). Deliverable, pure-SQL (no runtime). DB-backed
  # gate tests skip cleanly when Postgres is absent (same pattern as the runtime
  # suite), so fmt/clippy/check + unit tests are the enforced CI gate.
  # ---------------------------------------------------------------------------
  admin-shim:
    name: Admin shim (Rust BE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/admin-shim
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal \
            --component rustfmt,clippy
          rustup default "${RUST_TOOLCHAIN}"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/admin-shim/target
          key: cargo-adminshim-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('src/admin-shim/Cargo.lock') }}
          restore-keys: |
            cargo-adminshim-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: fmt
        run: cargo fmt --check

      - name: clippy (-D warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: check
        run: cargo check

      - name: test (DB-backed gates skip without Postgres)
        run: cargo test -- --test-threads=1

  # ---------------------------------------------------------------------------
  # Gate 5 — Admin web console (React/Vite FE). Deliverable. test + lint + build.
  # ---------------------------------------------------------------------------
  admin-web:
    name: Admin web (React FE)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: install
        run: npm ci

      - name: test
        run: npm test

      - name: lint
        run: npm run lint

      - name: build
        run: npm run build
